services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: akademi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  typesense:
    image: typesense/typesense:0.25.1
    ports:
      - "8108:8108"
    environment:
      TYPESENSE_API_KEY: your_typesense_key
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense-data:/data

volumes:
  pgdata:
  typesense-data:
