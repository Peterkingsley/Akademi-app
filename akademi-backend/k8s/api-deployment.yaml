apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: gcr.io/akademi/api:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: akademi-secrets
        env:
        - name: SERVICE_TYPE
          value: "api"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
