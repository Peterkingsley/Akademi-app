apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket
  template:
    metadata:
      labels:
        app: websocket
    spec:
      containers:
      - name: websocket
        image: gcr.io/akademi/websocket:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: akademi-secrets
        env:
        - name: SERVICE_TYPE
          value: "websocket"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
