name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - project-setup-architecture-3591889499529925449

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: akademi-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: akademi-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/akademi
          JWT_SECRET: ci-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
        run: npm run ci:check

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: akademi-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: akademi-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run ci:check
