name: Render Safety

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - project-setup-architecture-3591889499529925449
    paths:
      - "akademi-backend/**"
      - "docs/operations/**"
      - ".github/workflows/render-safety.yml"

jobs:
  render-build-contract:
    name: Render build contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: akademi-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: akademi-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify render build script prerequisites
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/akademi
          JWT_SECRET: ci-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
        run: |
          npm run ci:check
          npx prisma validate
